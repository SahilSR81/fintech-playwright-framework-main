[pytest]

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --alluredir=allure-results

testpaths = tests

python_files = test_*.py

python_classes = Test*

python_functions = test_*

markers =
    smoke: Smoke tests
    regression: Regression tests
    sanity: Sanity tests
    login: Login related tests
    register: Registration related tests